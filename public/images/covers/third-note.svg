<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#fafafa"/>
  <!-- Diagonal grid -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Nested squares -->
  <rect x="340" y="240" width="120" height="120" fill="none" stroke="#0c0c0c" stroke-width="2"/>
  <rect x="360" y="260" width="80" height="80" fill="#c53030" opacity="0.12"/>
  <rect x="380" y="280" width="40" height="40" fill="#0c0c0c"/>
  <!-- Corner registration marks -->
  <rect x="40" y="40" width="24" height="2" fill="#0c0c0c"/>
  <rect x="40" y="40" width="2" height="24" fill="#0c0c0c"/>
  <rect x="736" y="40" width="24" height="2" fill="#0c0c0c"/>
  <rect x="758" y="40" width="2" height="24" fill="#0c0c0c"/>
  <rect x="40" y="558" width="24" height="2" fill="#0c0c0c"/>
  <rect x="40" y="536" width="2" height="24" fill="#0c0c0c"/>
  <rect x="736" y="558" width="24" height="2" fill="#0c0c0c"/>
  <rect x="758" y="536" width="2" height="24" fill="#0c0c0c"/>
</svg>
