<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#fafafa"/>
  <!-- Horizontal rules representing text lines -->
  <rect x="100" y="100" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="140" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="180" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="220" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="260" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="300" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="340" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="380" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="420" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="460" width="600" height="1" fill="#e5e5e5"/>
  <rect x="100" y="500" width="600" height="1" fill="#e5e5e5"/>
  <!-- Title block -->
  <rect x="100" y="107" width="180" height="6" fill="#0c0c0c"/>
  <!-- Text blocks -->
  <rect x="100" y="147" width="400" height="3" fill="#8b8b8b"/>
  <rect x="100" y="187" width="360" height="3" fill="#8b8b8b"/>
  <rect x="100" y="227" width="420" height="3" fill="#8b8b8b"/>
  <!-- Code block -->
  <rect x="100" y="274" width="280" height="40" rx="2" fill="#f2f2f2" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="112" y="288" width="120" height="3" fill="#c53030"/>
  <rect x="112" y="298" width="80" height="3" fill="#0c0c0c"/>
  <!-- Quote accent line -->
  <rect x="100" y="348" width="2" height="24" fill="#c53030"/>
  <rect x="112" y="352" width="200" height="3" fill="#3d3d3d"/>
  <rect x="112" y="362" width="160" height="3" fill="#3d3d3d"/>
</svg>
