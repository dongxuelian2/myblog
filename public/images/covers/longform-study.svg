<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#fafafa"/>
  <!-- Grid -->
  <line x1="200" y1="0" x2="200" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="0" y1="150" x2="800" y2="150" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#e5e5e5" stroke-width="1"/>
  <!-- Accent blocks -->
  <rect x="200" y="150" width="200" height="150" fill="#0c0c0c"/>
  <rect x="600" y="0" width="200" height="150" fill="#c53030"/>
  <!-- Small typography -->
  <rect x="40" y="40" width="100" height="6" fill="#0c0c0c"/>
  <rect x="40" y="56" width="60" height="3" fill="#8b8b8b"/>
  <rect x="440" y="180" width="120" height="4" fill="#0c0c0c"/>
  <rect x="440" y="196" width="80" height="3" fill="#8b8b8b"/>
  <rect x="440" y="212" width="100" height="3" fill="#8b8b8b"/>
  <circle cx="500" cy="520" r="30" fill="none" stroke="#0c0c0c" stroke-width="2"/>
</svg>
